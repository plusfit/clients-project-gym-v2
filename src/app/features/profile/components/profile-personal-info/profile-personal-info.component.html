<ion-card class="info-card">
  <ion-card-header>
    <ion-card-title>
      <ion-icon
        name="information-circle-outline"
        class="profile-icon"
      ></ion-icon>
      <span class="title">Información Personal</span>
    </ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <p class="email-info" (click)="showFullEmail($event)" title="{{ email }}" style="cursor: pointer;">
      <ion-icon name="mail-outline" class="info-icon"></ion-icon>
      <span class="email-text">{{ email }}</span>
    </p>

    <!-- Tooltip popover sobre el email -->
    <ion-popover
      [isOpen]="isPopoverOpen"
      [event]="popoverEvent"
      (didDismiss)="onPopoverDismissed()"
      side="top"
      alignment="start"
      [showBackdrop]="false">
      <ng-template>
        <div style="padding: 10px 14px; font-size: 0.95rem;">
          {{ email }}
        </div>
      </ng-template>
    </ion-popover>

    <p>
      <ion-icon name="phone-portrait-outline" class="info-icon"></ion-icon>
      <span>{{ phone }}</span>
    </p>
    <p>
      <ion-icon name="fitness-outline" class="info-icon"></ion-icon>
      <span>Mutualista: {{ medicalSociety }}</span>
    </p>
  </ion-card-content>
</ion-card>
